services:

  glassfish:
    build: .
    container_name: cadastroee-app

    ports:
      - "8080:8080"
      - "4848:4848"

    volumes:
      - .:/app

    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cadastroee-db

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SenhaForte123!"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: